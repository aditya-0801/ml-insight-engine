<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analysis History</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#0f172a;
padding:40px;
color:white;
}

.container{
max-width:1200px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:30px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
color:black;
border-radius:10px;
overflow:hidden;
}

th{
background:#2563eb;
color:white;
padding:15px;
}

td{
padding:12px;
text-align:center;
border-bottom:1px solid #ddd;
}

tr:hover{
background:#f2f2f2;
}

.btn{

display:inline-block;
margin-top:25px;

padding:12px 22px;

background:#2563eb;

color:white;

text-decoration:none;

border-radius:8px;

}

</style>

</head>

<body>

<div class="container">

<h1>📊 ML Insight Engine History</h1>

<table>

<tr>

<th>ID</th>

<th>Dataset</th>

<th>Rows</th>

<th>Columns</th>

<th>Best Model</th>

<th>Accuracy</th>

</tr>

{% for record in records %}

<tr>

<td>{{ record.id }}</td>

<td>{{ record.filename }}</td>

<td>{{ record.rows }}</td>

<td>{{ record.columns }}</td>

<td>{{ record.best_model }}</td>

<td>{{ record.accuracy }}%</td>

</tr>

{% endfor %}

</table>

<div style="text-align:center">

<a href="/" class="btn">🏠 Home</a>

</div>

</div>

</body>
</html>
